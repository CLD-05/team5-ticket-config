# dev 환경용 override (env는 name 기준 merge)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: ticketing
spec:
  template:
    spec:
      containers:
        - name: ticket-service
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: QUEUE_TOKEN_BYPASS
              value: "false"
            - name: AWS_S3_POSTER_BUCKET
              value: team5-dev-poster-bucket
