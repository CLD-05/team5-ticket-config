apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-worker
  namespace: ticketing
  labels:
    app: booking
    app.kubernetes.io/name: booking-worker
    app.kubernetes.io/part-of: team5-ticket
spec:
  # replicas 명시 안 함 → KEDA ScaledObject가 min~max로 관리.
  # ArgoCD selfHeal이 replicas를 되돌리지 않게 services Application에
  # ignoreDifferences(/spec/replicas) 추가 권장 (PR 설명에 별도 표기).
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-worker
  template:
    metadata:
      labels:
        app: booking
        app.kubernetes.io/name: booking-worker
        app.kubernetes.io/part-of: team5-ticket
    spec:
      serviceAccountName: ticket-service        # SQS IRSA (role annotation은 SA에서 담당자 확정)
      containers:
        - name: booking-worker
          image: ticket-service                 # api와 동일 이미지, 프로파일로 역할 분리
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080               # actuator 메트릭(/actuator/prometheus) 노출용
          envFrom:
            - secretRef:
                name: ticket-app-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev,worker                 # worker 프로파일 = @SqsListener 활성
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              value: ap-northeast-2
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 1Gi }