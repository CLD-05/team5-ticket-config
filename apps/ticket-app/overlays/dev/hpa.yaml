apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ticket-service-hpa
  namespace: ticketing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ticket-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  # 스케일 거동 정책 (flapping 방지). 팀원 PR의 behavior 블록 흡수.
  behavior:
    # 급증: 60초 관찰 후 빠르게 확장 (최대 100%↑ 또는 +4 Pod/분 중 큰 쪽)
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 4
          periodSeconds: 60
      selectPolicy: Max
    # 축소: 5분 관찰 후 천천히 (분당 최대 50%만 줄임 = 갑자기 다 내려가는 거 방지)
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Min