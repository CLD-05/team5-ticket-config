apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-worker
  namespace: ticketing
  labels:
    app: booking
    app.kubernetes.io/name: booking-worker
    app.kubernetes.io/part-of: team5-ticket
spec:
  # replicas 명시 안 함 → KEDA ScaledObject가 min~max로 관리.
  selector:
    matchLabels:
      app.kubernetes.io/name: booking-worker
  template:
    metadata:
      labels:
        app: booking
        app.kubernetes.io/name: booking-worker
        app.kubernetes.io/part-of: team5-ticket
    spec:
      serviceAccountName: ticket-service
      containers:
        - name: booking-worker
          image: ticket-service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: ticket-app-secret
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod,worker
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              value: ap-northeast-2
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://team5-prod-rds.cx482c6a63zp.ap-northeast-2.rds.amazonaws.com:3306/ticketing?useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
            # SQS 리스너 동시성 — 커스텀 factory가 프로퍼티 바인딩 무시하므로
            # 코드(AwsSqsConfig)에서 처리. env는 참고용 미사용.
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: http }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 3              # 1(기본)→3. CPU 포화 시 probe 여유 (503 방지)
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: http }
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 3              # 1→3
          resources:
            requests: { cpu: "1",   memory: 1Gi }    # 250m→1, 512Mi→1Gi
            limits:   { cpu: "3",   memory: 2Gi }    # 1→3코어, 1→2Gi