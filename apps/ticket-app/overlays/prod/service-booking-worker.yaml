apiVersion: v1
kind: Service
metadata:
  name: team5-prod-booking-worker
  namespace: ticketing
  labels:
    app: booking                       # ServiceMonitor(selector app=booking)가 api+worker 둘 다 잡음
    app.kubernetes.io/name: team5-prod-booking-worker
spec:
  type: ClusterIP
  clusterIP: None                      # headless (LB 불필요, 메트릭 scrape 전용)
  selector:
    app.kubernetes.io/name: booking-worker
  ports:
    - name: http
      port: 80
      targetPort: http
