# booking-queue 적체량 기준으로 Worker Pod를 오토스케일.
# 데시드 Pod 수 = ceil(메시지 수 / queueLength)
#   예) 메시지 50, queueLength 5 -> 10 Pod
#
# 사전 조건:
#   1) keda-operator ServiceAccount에 IRSA role-arn annotation 적용 (terraform output 값)
#   2) identityOwner: operator -> operator의 IRSA 자격증명 사용
#
# prod SQS queue 기준 Worker Pod 오토스케일 설정
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: booking-worker
  namespace: ticketing # 서비스 네임스페이스 (config repo 확인 결과)
spec:
  scaleTargetRef:
    name: booking-worker
  minReplicaCount: 1 # scale-to-zero 원하면 0 (첫 메시지 cold start 감수)
  maxReplicaCount: 20
  pollingInterval: 10 # 10초마다 큐 길이 확인
  cooldownPeriod: 120 # 마지막 트리거 후 120초 뒤 축소
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        metricName: aws_sqs_approximate_number_of_messages_visible_average
        query: sum(aws_sqs_approximate_number_of_messages_visible_average{dimension_QueueName="team5-prod-booking-queue.fifo"})
        threshold: "5"
