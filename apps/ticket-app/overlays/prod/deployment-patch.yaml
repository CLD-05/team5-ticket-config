# prod 전용 override: dev 기본값(base)을 prod 값으로 덮음 (env는 name 기준 merge)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: ticketing
spec:
  template:
    spec:
      containers:
        - name: ticket-service
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: QUEUE_TOKEN_BYPASS
              value: "false"
