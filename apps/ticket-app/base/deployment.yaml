apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: ticketing
  labels:
    app: booking
    app.kubernetes.io/name: ticket-service
    app.kubernetes.io/part-of: team5-ticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ticket-service
  template:
    metadata:
      labels:
        app: booking
        app.kubernetes.io/name: ticket-service
        app.kubernetes.io/part-of: team5-ticket
    spec:
      serviceAccountName: ticket-service
      containers:
        - name: ticket-service
          # kustomization.yaml의 images 설정이 실제 ECR image/tag로 치환
          image: ticket-service
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          # ExternalSecret이 생성한 Kubernetes Secret을 Spring Boot 환경변수로 주입
          envFrom:
            - secretRef:
                name: ticket-app-secret

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              value: ap-northeast-2
            # ⚠️ 부하테스트(A 방식) 전용: 큐토큰 검증 우회.
            # 측정 끝나면 "false"로 되돌리거나 제거.
            - name: QUEUE_TOKEN_BYPASS
              value: "true"
            # 대기열 진입(enter)이 Redis 왕복으로 스레드를 오래 점유 → 대량 부하 대비 상향
            - name: SERVER_TOMCAT_THREADS_MAX
              value: "400"

          # Actuator 기반 기본 헬스체크.
          # 앱 설정에서 probe endpoint가 비활성화되어 있으면 /actuator/health로 조정 필요
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            # 대량 부하 시 톰캣 스레드가 요청에 묶여 probe 지연 → 5s/10회로 여유
            # (5000 VU 측정에서 probe 3s가 파드 재시작을 유발한 결과 반영)
            timeoutSeconds: 5
            failureThreshold: 10

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            # 부하 중 probe 스레드 굶주림으로 인한 오탐 재시작 방지 (5000 VU 측정 기반)
            timeoutSeconds: 5
            failureThreshold: 5

          resources:
            requests:
              cpu: "300m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"