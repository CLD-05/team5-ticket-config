apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ticket-route
  namespace: ticketing
spec:
  parentRefs:
    - name: ticket-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ticket-service
          port: 80
