apiVersion: v1
kind: ServiceAccount
metadata:
  name: ticket-service
  namespace: ticketing
  labels:
    app: booking
    app.kubernetes.io/name: ticket-service
    app.kubernetes.io/part-of: team5-ticket

  # AWS API 호출을 Pod Identity/IRSA로 전환할 경우 이곳에 role annotation을 추가합니다.
  # 현재는 앱 쪽 SQS 설정 정리가 끝난 뒤 담당자와 ARN을 확정하는 것이 안전합니다.
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::194722398200:role/team5-dev-ticket-service
