apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ticket-gateway
  namespace: ticketing
  annotations:
    # AWS Load Balancer Controller annotations (equivalent to Ingress annotations)
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  gatewayClassName: alb
  infrastructure:
    parametersRef:
      group: gateway.k8s.aws
      kind: LoadBalancerConfiguration
      name: ticket-gateway-config
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
