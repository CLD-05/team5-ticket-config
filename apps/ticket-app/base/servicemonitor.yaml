apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ticket-app-monitor
  namespace: ticketing
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: ticket-app
  namespaceSelector:
    matchNames:
      - ticket-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
