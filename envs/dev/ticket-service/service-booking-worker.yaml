apiVersion: v1
kind: Service
metadata:
  name: team5-dev-booking-worker
  namespace: ticketing
  labels:
    app: booking                       # ServiceMonitor(selector app=booking)가 api+worker 둘 다 잡음
    app.kubernetes.io/name: team5-dev-booking-worker
spec:
  type: ClusterIP
  clusterIP: None                      # headless (LB 불필요, 메트릭 scrape 전용)
  selector:
    app.kubernetes.io/name: booking-worker   # ← deployment-booking-worker 파드 라벨과 일치 (기존 team5-dev-booking-worker는 불일치라 endpoints 0개였음)
  ports:
    - name: http
      port: 80
      targetPort: http