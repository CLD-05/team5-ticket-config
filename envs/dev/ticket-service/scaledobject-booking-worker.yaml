# booking-queue 적체량 기준으로 Worker Pod를 오토스케일.
# 데시드 Pod 수 = ceil(메시지 수 / queueLength)
#   예) 메시지 50, queueLength 5 -> 10 Pod
#
# 사전 조건:
#   1) keda-operator ServiceAccount에 IRSA role-arn annotation 적용 (terraform output 값)
#   2) identityOwner: operator -> operator의 IRSA 자격증명 사용
#
# ↓↓↓ 치환 필요 항목 (실제 값으로 반드시 교체) ↓↓↓
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: booking-worker
  namespace: ticketing           # 서비스 네임스페이스 (config repo 확인 결과)
spec:
  scaleTargetRef:
    name: booking-worker         # ← ⚠️ 실제 Worker Deployment 이름으로 치환 (env/dev/ticket-service에 워커 매니페스트가 아직 없음)
  minReplicaCount: 1             # scale-to-zero 원하면 0 (첫 메시지 cold start 감수)
  maxReplicaCount: 20
  pollingInterval: 15            # 15초마다 큐 길이 확인
  cooldownPeriod: 120            # 마지막 트리거 후 120초 뒤 축소
  triggers:
    - type: aws-sqs-queue
      metadata:
        # queueURL / awsRegion 은 sqs 모듈 output 기준으로 치환
        queueURL: "https://sqs.ap-northeast-2.amazonaws.com/194722398200/team5-dev-booking-queue"  # ← 치환
        awsRegion: "ap-northeast-2"          # ← 치환
        queueLength: "5"                     # Pod당 목표 메시지 수 (부하테스트 시나리오2로 튜닝)
        activationQueueLength: "1"           # 0→1 스케일 임계 (min 0일 때 의미)
        identityOwner: operator              # keda-operator IRSA 자격증명 사용