# 티켓 오픈 피크 시점 사전 예열용 ScaledObject
# 사용법: 티켓 오픈 1시간 전 kubectl apply -f prewarm-scaledobject.yaml
# 종료후: kubectl apply -f scaledobject-booking.yaml 으로 원복
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: booking-worker
  namespace: ticketing
spec:
  scaleTargetRef:
    name: booking-worker
  minReplicaCount: 8
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 120
  triggers:
    - type: aws-sqs-queue
      metadata:
        queueURL: "https://sqs.ap-northeast-2.amazonaws.com/194722398200/team5-prod-booking-queue.fifo"
        awsRegion: "ap-northeast-2"
        queueLength: "5"
        activationQueueLength: "1"
        identityOwner: operator
