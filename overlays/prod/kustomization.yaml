# overlays/prod/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

  # worker 워크로드
  - deployment-booking-worker.yaml
  - service-booking-worker.yaml

  # Observability / autoscaling manifests added by the observability owner.
  # Keep these resources registered so Prometheus/KEDA settings are not dropped.
  - scaledobject-booking-worker.yaml
  - servicemonitor-booking.yaml
  - prometheusrule-booking.yaml
  - prewarm-scaledobject.yaml

images:
  - name: ticket-service
    newName: 194722398200.dkr.ecr.ap-northeast-2.amazonaws.com/team5-prod-app
    newTag: prod-placeholder
