# system-addons/overlays/prod/kube-prometheus-stack-app.yaml
# Prometheus Operator 본체(kube-prometheus-stack chart)를 띄우는 ArgoCD Application.
# 재생성 과정에서 이 Application 정의가 repo에서 빠져 monitoring 미기동 → 복구본.
# PrometheusRule(booking-slo)은 같은 디렉토리 kube-prometheus-stack.yaml에 그대로 분리 유지.
# 사전: alertmanager-slack ExternalSecret이 monitoring ns에 있어야 함(이미 있음).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.7.2
    helm:
      values: |
        # EKS 관리형 control plane 메트릭은 노출 안 됨 -> 해당 default alert는 항상 오탐.
        # KubeSchedulerDown / KubeControllerManagerDown / etcd / kubeProxy 4종 비활성.
        defaultRules:
          create: true
          rules:
            kubeSchedulerAlerting: false
            kubeControllerManager: false
            etcd: false
            kubeProxy: false
        grafana:
          enabled: true
          grafana.ini:
            security:
              allow_embedding: true
          persistence:
            enabled: true
            storageClassName: gp3
            size: 5Gi
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              # 공유 AWS 계정에서 다른 팀의 monitoring/grafana Ingress와 ALB 이름이 충돌하는 문제 회피
              # 기본 생성 규칙 k8s-{ns}-{name}-{hash}가 32자 제한으로 잘려 �돌 발생.
              # team5 고유 이름(20자)으로 명시 지정하여 �돌 원천 차단.
              alb.ingress.kubernetes.io/load-balancer-name: t5-prod-grafana-alb
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
              alb.ingress.kubernetes.io/healthcheck-path: /api/health
            path: /
            pathType: Prefix
          # adminPassword 는 ESO로 주입 권장 (평문 금지)
        prometheus:
          prometheusSpec:
            retention: 15d
            # 부하 중 t3.large CPU 스로틀 -> /-/healthy 3s 초과 -> liveness 실패 -> 재시작 방지.
            # liveness probe는 operator 관리라 values로 못 늘림 -> 자원 보장으로 스로틀 자체 제거.
            # 안정 사용량 ~723Mi/60m 기준, 노드 8Gi 내에서 피크 흡수.
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                cpu: "1"
                memory: 2Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          alertmanagerSpec:
            secrets:
              - alertmanager-slack
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
          config:
            route:
              receiver: slack-default
              group_by: ["alertname"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
                - matchers:
                    - severity = "critical"
                  receiver: slack-critical
            receivers:
              - name: slack-default
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url
                    channel: "#team5-alerts"          # ← 채널명 치환
                    send_resolved: true
                    title: '[PROD][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: >-
                      {{ range .Alerts }}*{{ .Annotations.summary }}*
                      {{ .Annotations.description }}
                      {{ end }}
              - name: slack-critical
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url-critical
                    channel: "#team5-critical"        # ← 채널명 치환
                    send_resolved: true
                    title: '[PROD][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: >-
                      {{ range .Alerts }}*{{ .Annotations.summary }}*
                      {{ .Annotations.description }}
                      {{ end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Large CRD 처리를 위해 추가