# system-addons/kube-prometheus-stack.yaml  (기존 파일 대체)
# 변경점(기존 values에 추가):
#   - ruleSelectorNilUsesHelmValues:false  -> 우리 PrometheusRule을 Prometheus가 인식 (없으면 알림 규칙 무시됨)
#   - podMonitor/probe selector도 동일 처리
#   - prometheus/grafana/alertmanager PV (gp3)  -> 데이터 휘발 방지 ("PV 볼륨 구성")
#   - alertmanager Slack 라우팅 (secret: alertmanager-slack 마운트)
#
# 사전: monitoring 네임스페이스에 alertmanager-slack Secret 필요.
#   너희는 external-secrets(ESO) 쓰니까 kubectl 대신 ExternalSecret로 SSM에서 주입 권장.
#   key 이름은 webhook-url 로 맞출 것 (아래 api_url_file 경로와 일치).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 61.7.2
    helm:
      values: |
        # EKS 관리형 control plane 메트릭은 노출 안 됨 -> 해당 default alert는 항상 오탐.
        # KubeSchedulerDown / KubeControllerManagerDown / etcd / kubeProxy 4종 비활성.
        defaultRules:
          create: true
          rules:
            kubeSchedulerAlerting: false
            kubeControllerManager: false
            etcd: false
            kubeProxy: false
        grafana:
          enabled: true
          grafana.ini:
            security:
              allow_embedding: true
          persistence:
            enabled: true
            storageClassName: gp3
            size: 5Gi
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
              alb.ingress.kubernetes.io/healthcheck-path: /api/health
            path: /
            pathType: Prefix
          # adminPassword 는 ESO로 주입 권장 (평문 금지)
        prometheus:
          prometheusSpec:
            retention: 15d
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
        alertmanager:
          alertmanagerSpec:
            secrets:
              - alertmanager-slack
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: gp3
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 2Gi
          config:
            route:
              receiver: slack-default
              group_by: ["alertname"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
                - matchers:
                    - severity = "critical"
                  receiver: slack-critical
            receivers:
              - name: slack-default
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url
                    channel: "#team5-alerts"          # ← 채널명 치환
                    send_resolved: true
                    title: '[PROD][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: >-
                      {{ range .Alerts }}*{{ .Annotations.summary }}*
                      {{ .Annotations.description }}
                      {{ end }}
              - name: slack-critical
                slack_configs:
                  - api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url-critical
                    channel: "#team5-critical"        # ← 채널명 치환
                    send_resolved: true
                    title: '[PROD][{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
                    text: >-
                      {{ range .Alerts }}*{{ .Annotations.summary }}*
                      {{ .Annotations.description }}
                      {{ end }}

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true  # Large CRD 처리를 위해 추가