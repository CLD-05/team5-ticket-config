apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-slack
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-slack
    app.kubernetes.io/part-of: team5-ticket
spec:
  refreshInterval: 1h

  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager        # system-addons/clustersecretstore.yaml 와 동일

  target:
    name: alertmanager-slack         # kube-prometheus-stack alertmanagerSpec.secrets[] 와 일치
    creationPolicy: Owner

  data:
    # ↓ key 이름은 반드시 webhook-url 로. kube-prometheus-stack.yaml 의
    #   api_url_file: /etc/alertmanager/secrets/alertmanager-slack/webhook-url 경로와 맞아야 함.
    - secretKey: webhook-url
      remoteRef:
        key: team5/prod/alertmanager     # ← Secrets Manager 시크릿 이름 (아래 사전작업 참고)
        property: webhook-url
