apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-autoscaler
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/autoscaler
    chart: cluster-autoscaler
    targetRevision: 9.50.0   # ⚠️ 클러스터 1.35 ↔ CA 이미지 버전 호환 확인(아래 메모). 안 맞으면 image.tag override
    helm:
      valuesObject:
        # 우리 EKS 클러스터의 ASG를 태그로 자동 발견
        autoDiscovery:
          clusterName: team5-prod-eks
        awsRegion: ap-northeast-2

        rbac:
          serviceAccount:
            name: cluster-autoscaler   # monitoring 모듈 cluster_autoscaler_service_account 와 일치
            annotations:
              # ⚠️ terraform apply output cluster_autoscaler_irsa_role_arn 값으로 치환
              #    (= arn:aws:iam::194722398200:role/team5-ticket-dev-cluster-autoscaler 예상)
              eks.amazonaws.com/role-arn: arn:aws:iam::194722398200:role/team5-prod-cluster-autoscaler

        extraArgs:
          # 노드 비면 빨리 정리(기본 10분 → 데모/테스트용으로 단축)
          scale-down-unneeded-time: 5m
          scale-down-delay-after-add: 5m
          # 같은 스펙 노드그룹이 여러 개일 때 분배 전략
          expander: least-waste
          # ASG min까지 줄이되 그 아래로는 안 내려감(안전)
          balance-similar-node-groups: true
          skip-nodes-with-system-pods: false

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system   # monitoring 모듈 cluster_autoscaler_namespace 와 일치

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true