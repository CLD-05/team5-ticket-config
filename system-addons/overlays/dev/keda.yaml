apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.15.1
    helm:
      values: |
        serviceAccount:
          operator:
            annotations:
              eks.amazonaws.com/role-arn: arn:aws:iam::194722398200:role/team5-ticket-dev-keda-sqs

  destination:
    server: https://kubernetes.default.svc
    namespace: keda

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
