# =====================================================================
# booking 도메인 SLO / 알림 규칙  (dev)
# ---------------------------------------------------------------------
# 설계 원칙 (멘토 피드백 반영):
#   - 절대값 임계("p99 > 5s") 가 아니라 "위반 빈도 + 에러버짓" 기반.
#   - SLI 판정은 1분 윈도우 단위(good=0 / bad=1)로 기록 -> 30일 누적이 곧 예산 소비량.
#   - latency/freshness 는 윈도우 기반 SLO, 가용성(성공률)은 이벤트 기반 비율 SLO.
#     (성격이 다르므로 형태도 다르게 둠.)
#
# SLI 2종:
#   (동기)  좌석 선점 p99 지연      threshold 300ms   target 99.5% good windows
#   (비동기) 큐 나이(oldest msg)    threshold  60s    target  99%  good windows
#   * e2e p99 는 SLO 에서 제외(트레이싱 붙은 뒤 진단용 ground truth 로만 사용).
#   * conflict(409, 동시성 정상 거절)는 어떤 분모에도 넣지 않음.
#
# ⚠️ target(허용 bad 비율)과 threshold 는 "잠정값"이다.
#    baseline / 부하테스트 시나리오2 측정 후 반드시 튜닝할 것.
#    (자=측정 메커니즘은 지금 박고, 목표 숫자 N 은 데이터로 확정)
#
# ⚠️ repo 에 있다 != 클러스터에 떠있다.
#    - ArgoCD targetRevision=main 이므로 develop 머지만으로는 sync 안 됨.
#    - apply 후 Prometheus UI 에서 각 record 시계열이 실제로 값이 찍히는지
#      (No data / 0 고정 아닌지) 반드시 확인. (과거 'confiremd' 오타 교훈)
# =====================================================================
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: booking-slo
  namespace: ticketing
spec:
  groups:
    # =================================================================
    # [그룹 1] SLI 판정 — 1분 윈도우. interval:1m 이라 1샘플=1윈도우.
    #   이 그룹의 record 가 30일 누적/burn-rate 의 원재료가 된다.
    # =================================================================
    - name: booking.sli
      interval: 1m
      rules:
        # ---- (동기) 좌석 선점 p99 지연 ----
        # uri 정확매칭 + method=POST 격리. (라이브 라벨 확정: uri="/api/v1/seats/{seatId}/hold")
        #   기존 prefix 정규식 /api/v1/seats.* 은 같은 path 의 DELETE(release) 까지 흡수해
        #   p99 를 오염시켰음 -> NaN/오발(FastBurn) 원인. 정확매칭으로 격리.
        # 무트래픽 분(分)에는 시계열 자체가 없음 -> bad_window 에 gap.
        #   gap = "그 분엔 요청이 없어 위반 판정 불가" 로 처리(예산 분모에서도 제외됨). 의도된 동작.
        - record: booking:seathold_latency_p99_seconds
          expr: |
            histogram_quantile(0.99,
              sum by (le) (rate(http_server_requests_seconds_bucket{uri="/api/v1/seats/{seatId}/hold", method="POST"}[2m])))

        # bad=1 / good=0. threshold 300ms.
        - record: booking:seathold_latency:bad_window
          expr: booking:seathold_latency_p99_seconds > bool 0.7

        # ---- (비동기) 큐 나이 = 가장 오래 대기 중인 메시지 나이(초) ----
        # YACE 가 ApproximateAgeOfOldestMessage(Maximum) 를 이미 수집 중.
        # 게이지라 항상 존재(큐 비면 0). count 가 아니라 'age' 가 우리 SLI.
        # ⚠️ 큐 이름 .fifo 여부 불확실(FIFO 마이그레이션 중간 상태) →
        #    dimension_QueueName 을 정확매칭 대신 regex(=~)로 .fifo 유무 양쪽 매칭.
        #    apply 후 Prometheus 에서 실제 라벨값 확인하고 필요시 좁힐 것.
        - record: booking:queue_age_seconds:max
          expr: |
            max(aws_sqs_approximate_age_of_oldest_message_maximum{dimension_QueueName="team5-dev-booking-queue"})

        # bad=1 / good=0. threshold 60s.
        # (KEDA pollingInterval 15s + cooldown 120s 반응 lag 흡수 위해 60s. 시나리오2로 30s 조이기 검토)
        - record: booking:queue_age:bad_window
          expr: booking:queue_age_seconds:max > bool 60

    # =================================================================
    # [그룹 2] 에러버짓 — 30일 누적. 무거운 30d 쿼리라 interval:5m.
    #   consumed = bad 분 수, observed = 관측된 분 수(무트래픽 제외).
    #   budget_remaining_ratio = 1 - (consumed / (observed * 허용bad비율))
    #     1.0  = 예산 100% 남음 / 0.0 = 예산 소진 / 음수 = SLO 위반(초과 소비)
    # =================================================================
    - name: booking.slo_budget
      interval: 5m
      rules:
        # ---- (동기) target 99.5% -> 허용 bad 비율 0.005  (≈ 30일 216분) ----
        - record: booking:seathold_latency:bad_windows_30d
          expr: sum_over_time(booking:seathold_latency:bad_window[30d])
        - record: booking:seathold_latency:observed_windows_30d
          expr: count_over_time(booking:seathold_latency:bad_window[30d])
        - record: booking:seathold_latency:budget_remaining_ratio
          # ⚠️ 0.005 = 허용 bad 비율(잠정, target 99.5%). 측정 후 튜닝.
          expr: |
            1 - (
              booking:seathold_latency:bad_windows_30d
              /
              (booking:seathold_latency:observed_windows_30d * 0.005)
            )

        # ---- (비동기) target 99% -> 허용 bad 비율 0.01  (≈ 30일 432분) ----
        # 비동기는 스파이크/오토스케일 lag 때문에 동기보다 느슨하게 시작.
        - record: booking:queue_age:bad_windows_30d
          expr: sum_over_time(booking:queue_age:bad_window[30d])
        - record: booking:queue_age:observed_windows_30d
          expr: count_over_time(booking:queue_age:bad_window[30d])
        - record: booking:queue_age:budget_remaining_ratio
          # ⚠️ 0.01 = 허용 bad 비율(잠정, target 99%). 측정 후 튜닝.
          expr: |
            1 - (
              booking:queue_age:bad_windows_30d
              /
              (booking:queue_age:observed_windows_30d * 0.01)
            )

    # =================================================================
    # [그룹 3] 알림
    #   - SLO 위반: multi-window burn-rate (fast=page / slow=ticket).
    #     burn rate = 최근 bad 비율 / 허용 bad 비율.
    #     fast 14.4배(1h&5m) -> ~2일이면 30일 예산 소진 = 즉시 대응.
    #     slow  6배 (6h&30m) -> 며칠 내 소진 = 추적.
    #   - 가용성(성공률)은 이벤트 기반 비율 SLO 그대로 유지.
    #   - 큐 적체(count)는 SLO 아님. KEDA 따라가는지 보는 운영 지표.
    # =================================================================
    - name: booking.alerts
      rules:
        # ---- (동기) 좌석 선점 p99 SLO burn-rate ----
        - alert: SeatHoldLatencyFastBurn
          expr: |
            avg_over_time(booking:seathold_latency:bad_window[1h]) > (14.4 * 0.005)
            and
            avg_over_time(booking:seathold_latency:bad_window[5m]) > (14.4 * 0.005)
          for: 2m
          labels:
            severity: critical
            team: team5
            slo: seat-hold-latency
          annotations:
            summary: "좌석 선점 p99 SLO 예산 빠른 소진 (fast burn)"
            description: "최근 1h bad-window 비율 {{ $value | humanizePercentage }} — 목표 0.5%의 14.4배 초과. 이 속도면 ~2일에 30일 예산 소진."

        - alert: SeatHoldLatencySlowBurn
          expr: |
            avg_over_time(booking:seathold_latency:bad_window[6h]) > (6 * 0.005)
            and
            avg_over_time(booking:seathold_latency:bad_window[30m]) > (6 * 0.005)
          for: 15m
          labels:
            severity: warning
            team: team5
            slo: seat-hold-latency
          annotations:
            summary: "좌석 선점 p99 SLO 예산 소진 추세 (slow burn)"
            description: "최근 6h bad-window 비율 {{ $value | humanizePercentage }} — 목표 0.5%의 6배 초과."

        # ---- (비동기) 큐 나이 SLO burn-rate ----
        - alert: QueueAgeFastBurn
          expr: |
            avg_over_time(booking:queue_age:bad_window[1h]) > (14.4 * 0.01)
            and
            avg_over_time(booking:queue_age:bad_window[5m]) > (14.4 * 0.01)
          for: 2m
          labels:
            severity: critical
            team: team5
            slo: queue-age
          annotations:
            summary: "큐 나이 SLO 예산 빠른 소진 (fast burn)"
            description: "최근 1h 큐 나이 60s 초과 윈도우 비율 {{ $value | humanizePercentage }} — 워커/노드 프로비저닝이 못 따라가는 신호."

        - alert: QueueAgeSlowBurn
          expr: |
            avg_over_time(booking:queue_age:bad_window[6h]) > (6 * 0.01)
            and
            avg_over_time(booking:queue_age:bad_window[30m]) > (6 * 0.01)
          for: 15m
          labels:
            severity: warning
            team: team5
            slo: queue-age
          annotations:
            summary: "큐 나이 SLO 예산 소진 추세 (slow burn)"
            description: "최근 6h 큐 나이 60s 초과 윈도우 비율 {{ $value | humanizePercentage }}."

        # ---- (비동기) 예매 확정 성공률 SLO 99% — 이벤트 기반(유지) ----
        # conflict(동시성 정상 거절)는 분모에서 제외: confirmed/(confirmed+failed).
        - alert: BookingConfirmSuccessSLOBreach
          expr: |
            (
              sum(rate(booking_confirm_total{result="confirmed"}[5m]))
              /
              sum(rate(booking_confirm_total{result=~"confirmed|failed"}[5m]))
            ) < 0.99
          for: 5m
          labels:
            severity: critical
            team: team5
            slo: booking-availability
          annotations:
            summary: "예매 확정 성공률 SLO(99%) 위반"
            description: "현재 성공률 {{ $value | humanizePercentage }} (conflict 제외)."

        # ---- (동기) 5xx 오류율 가드 (유지) ----
        # 409 좌석 충돌은 4xx라 여기 안 잡힘 = 의도된 동시성 거절은 정상.
        - alert: BookingHighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 2m
          labels:
            severity: warning
            team: team5
          annotations:
            summary: "booking 5xx 오류율 5% 초과"
            description: "현재 오류율 {{ $value | humanizePercentage }}."

        # ---- 큐 적체(count) — SLO 아님. KEDA 헬스/포화 지표(유지) ----
        # SLO 는 위의 '큐 나이'. 이건 KEDA 가 backlog 를 따라잡고 있는지 보는 운영 신호.
        - alert: BookingQueueBacklogHigh
          expr: |
            max(aws_sqs_approximate_number_of_messages_visible_maximum{dimension_QueueName="team5-dev-booking-queue"}) > 500
          for: 3m
          labels:
            severity: warning
            team: team5
          annotations:
            summary: "booking-queue 적체 500 초과 (KEDA 추적 지표, SLO 아님)"
            description: "현재 적체 {{ $value }}건 — KEDA 스케일/노드 프로비저닝이 못 따라가는지 확인."